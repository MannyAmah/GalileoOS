name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: go
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: kernel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: kernel/go.sum
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.0
          working-directory: kernel
          args: --timeout=3m
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  python:
    name: python
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install tools
        run: pip install "ruff==0.6.*" "mypy==1.11.*" "black==24.*" "pip-audit==2.7.*"
      - name: ruff
        run: ruff check .
      - name: black --check
        run: black --check .
      - name: mypy
        run: mypy --strict onboarding hello
      - name: pip-audit
        # Strict mode: any vulnerability fails the job. Skipped for the
        # empty stubs (no dependencies) but wired so it activates the
        # moment agents/ declares its first runtime dep.
        run: pip-audit --strict

  web:
    name: web
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install
        run: npm install --no-audit --no-fund
      - name: type-check
        run: npx tsc --noEmit
      - name: eslint
        run: npx eslint .
      - name: npm audit
        # --omit=dev focuses the audit on production dependencies.
        # Stage 0 skeleton has minimal deps; audit activates as web/
        # grows.
        run: npm audit --omit=dev --audit-level=high

  protobuf:
    name: protobuf
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: schemas
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.45.0"
      - name: buf lint
        run: buf lint
      - name: buf breaking
        # Uses ref=refs/remotes/origin/main rather than branch=main
        # because actions/checkout only populates the remote-tracking
        # ref, not a local main branch; buf's branch= form resolves
        # against refs/heads/, which we don't have on PR runners.
        # See schemas/README.md for the full rationale.
        run: buf breaking --against '../.git#ref=refs/remotes/origin/main,subdir=schemas'
