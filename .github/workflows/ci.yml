name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: go
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: kernel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: kernel/go.sum
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: kernel
          args: --timeout=3m
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  gateway-integration:
    # Stage 0 / PR-A: end-to-end test for the gateway against real
    # Postgres + LiteLLM service containers. Image tags are pinned per
    # the "Service image pins" table in CLAUDE.md and must move in
    # lock-step with deploy/compose/docker-compose.yml.
    #
    # Service health-cmd options mirror the healthchecks in the compose
    # file. GitHub Actions blocks `steps` from starting until every
    # service reports healthy — the analogue of compose's
    # `depends_on: service_healthy` on the developer's host.
    #
    # Temporal is deliberately not started here: PR-A's gateway does
    # not yet talk to it. PR-C adds Temporal when the agent-runner
    # ships.
    name: gateway-integration
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: kernel
    services:
      postgres:
        image: postgres:17.9-alpine
        env:
          POSTGRES_USER: galileo
          POSTGRES_PASSWORD: galileo
          POSTGRES_DB: galileo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U galileo -d galileo"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s
      litellm:
        image: ghcr.io/berriai/litellm:v1.83.14-stable.patch.3
        env:
          LITELLM_LOG: INFO
          LITELLM_MODE: test
        ports:
          - 4000:4000
        options: >-
          --health-cmd "wget -qO- http://localhost:4000/health/liveliness || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 15s
    env:
      GALILEO_GATEWAY_DATABASE_URL: postgres://galileo:galileo@localhost:5432/galileo?sslmode=disable
      GALILEO_GATEWAY_LITELLM_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: kernel/go.sum
      - name: gateway integration tests
        run: go test -tags=gateway_integration -count=1 -v ./cmd/gateway/...

  python:
    name: python
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install tools
        run: pip install "ruff==0.6.*" "mypy==1.11.*" "black==26.*" "pip-audit==2.7.*"
      - name: ruff
        run: ruff check .
      - name: black --check
        run: black --check .
      - name: mypy
        run: mypy --strict onboarding hello
      - name: pip-audit
        # Scoped to agents/'s declared project dependencies via the
        # positional project_path argument. Auditing the runner's full
        # installed env (the default) produces alerts on pip and the
        # install tooling that no contributor can act on from this repo;
        # that's noise the discipline rejects. Scoped audit is a no-op
        # pass today (zero runtime deps) and activates meaningfully when
        # Stage 1 adds LangGraph / CrewAI / Agno. See
        # docs/solutions/SOLUTION_CI_EXPANSION_FINDINGS.md.
        run: pip-audit --strict .

  web:
    name: web
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install
        run: npm install --no-audit --no-fund
      - name: type-check
        run: npx tsc --noEmit
      - name: eslint
        run: npx eslint .
      - name: npm audit
        # --omit=dev focuses the audit on production dependencies.
        # Stage 0 skeleton has minimal deps; audit activates as web/
        # grows.
        run: npm audit --omit=dev --audit-level=high

  protobuf:
    name: protobuf
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: schemas
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.45.0"
      - name: buf lint
        run: buf lint
      - name: buf breaking
        # Uses ref=refs/remotes/origin/main rather than branch=main
        # because actions/checkout only populates the remote-tracking
        # ref, not a local main branch; buf's branch= form resolves
        # against refs/heads/, which we don't have on PR runners.
        # See schemas/README.md for the full rationale.
        run: buf breaking --against '../.git#ref=refs/remotes/origin/main,subdir=schemas'
