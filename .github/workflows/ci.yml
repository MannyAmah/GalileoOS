name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: go
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: kernel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: kernel/go.sum
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./...

  python:
    name: python
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install ruff + mypy
        run: pip install "ruff==0.6.*" "mypy==1.11.*"
      - name: ruff
        run: ruff check .
      - name: mypy
        run: mypy --strict onboarding hello

  web:
    name: web
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install
        run: npm install --no-audit --no-fund
      - name: type-check
        run: npx tsc --noEmit

  protobuf:
    name: protobuf
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: schemas
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.45.0"
      - name: buf lint
        run: buf lint
      - name: buf breaking
        # The check is conditional only for the *introducing* PR (when
        # schemas/galileo/v1/ does not yet exist on main and there is
        # nothing to compare against). After PR #5 merges the guard
        # falls through; breaking runs against origin/main on every PR.
        # Guard removal is the first checkbox precondition of plan-PR #4.
        #
        # Uses ref=refs/remotes/origin/main rather than branch=main
        # because actions/checkout only populates the remote-tracking
        # ref, not a local main branch; buf's branch= form resolves
        # against refs/heads/, which we don't have on PR runners.
        run: |
          if git -C .. show "origin/main:schemas/galileo/v1/tenant.proto" >/dev/null 2>&1; then
            echo "main has schemas — running buf breaking against origin/main"
            buf breaking --against '../.git#ref=refs/remotes/origin/main,subdir=schemas'
          else
            echo "main has no schemas/ yet (this is the introducing PR)"
            echo "buf breaking will activate on the next PR after this one merges"
          fi
