name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: go
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: kernel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: kernel/go.sum
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: kernel
          args: --timeout=3m
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  gateway-integration:
    # Stage 0 / PR-A established the gateway integration test against
    # real Postgres + LiteLLM service containers. Stage 1 / PR-E
    # replaces the postgres:17.9-alpine GHA service container with the
    # locally-built postgres-brain image (pgvector + AGE), because GHA
    # service containers don't support locally-built images. Fork B
    # per PR-E's verification round: build the image in a setup step,
    # run via `docker run -d`, poll `pg_isready` until ready, then run
    # the integration tests. Same shape as the gateway-as-subprocess
    # pattern in agent-runner-integration (PR-C precedent).
    #
    # Temporal is deliberately not started here: PR-A's gateway does
    # not yet talk to it. agent-runner-integration adds Temporal.
    name: gateway-integration
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: kernel
    services:
      litellm:
        # LiteLLM's runtime image (cgr.dev/chainguard/wolfi-base) ships
        # neither curl nor wget — just bash, openssl, nodejs, npm,
        # python3, libsndfile. Use bash's /dev/tcp builtin for a
        # TCP-ready check; Uvicorn binds port 4000 only after
        # "Application startup complete" per the boot logs, so port-open
        # is a meaningful ready signal here. Matches the healthcheck in
        # deploy/compose/docker-compose.yml.
        image: ghcr.io/berriai/litellm:v1.83.14-stable.patch.3
        env:
          LITELLM_LOG: INFO
          LITELLM_MODE: test
        ports:
          - 4000:4000
        options: >-
          --health-cmd "bash -c '</dev/tcp/127.0.0.1/4000'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 15s
    env:
      GALILEO_GATEWAY_DATABASE_URL: postgres://galileo:galileo@localhost:5432/galileo?sslmode=disable
      GALILEO_GATEWAY_LITELLM_URL: http://localhost:4000
      # PR-B observability-substrate scope note: Jaeger + OTel collector run
      # as compose services on the dev host (`make up`) but NOT as GHA service
      # containers here. The OTel collector image is FROM scratch (no shell
      # for --health-cmd) and the wrapper-image approach can't run as a GHA
      # service container (services start before steps, can't reference a
      # locally-built image). The Stage 0 Week 4 gate test exercises the
      # full observability pipeline; PR-B's CI gate scopes to gateway
      # behavior alone. GALILEO_SKIP_OBS_WAIT bypasses the test setup's
      # bounded-retry polling for the OTel + Jaeger endpoints.
      GALILEO_SKIP_OBS_WAIT: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: kernel/go.sum
      - name: build postgres-brain image
        # PR-E custom Postgres image (pgvector + AGE on PG17). Built
        # locally per Fork B; not published to GHCR yet (the ≥3-custom-
        # images trigger in CLAUDE.md hasn't fired).
        run: docker build -t postgres-brain:ci ../deploy/compose/postgres-brain
      - name: start postgres-brain
        run: |
          docker run -d --name postgres-brain \
            -e POSTGRES_USER=galileo \
            -e POSTGRES_PASSWORD=galileo \
            -e POSTGRES_DB=galileo \
            -p 5432:5432 \
            postgres-brain:ci
          # Same bounded-retry shape as the observability poller in
          # the test setup. pg_isready in the running container is the
          # cleanest readiness check.
          for i in $(seq 1 30); do
            if docker exec postgres-brain pg_isready -U galileo -d galileo; then
              echo "postgres-brain ready"
              break
            fi
            sleep 1
          done
      - name: gateway integration tests
        run: go test -tags=gateway_integration -count=1 -v ./cmd/gateway/...
      - name: stop postgres-brain
        if: always()
        run: |
          docker logs postgres-brain > /tmp/postgres-brain.log 2>&1 || true
          docker stop postgres-brain || true
          docker rm postgres-brain || true
          tail -50 /tmp/postgres-brain.log || true

  python:
    # PR-D (Week 4) introduces the Python runtime to the repo: 10 runtime
    # deps in agents/pyproject.toml (langgraph, mcp, psycopg, opentelemetry-sdk,
    # opentelemetry-exporter-otlp, slack-sdk, google-api-python-client,
    # cryptography, temporalio, pyyaml) plus 3 dev deps for pytest. Install
    # the project itself with its dev extras so mypy and pytest see the
    # real type stubs and the modules they import, then run the lint/type/
    # security/test matrix.
    name: python
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install tools
        run: pip install "ruff==0.6.*" "mypy==1.11.*" "black==26.*" "pip-audit==2.7.*"
      - name: install project + dev deps
        # Editable install picks up the project's own modules for mypy's
        # import resolver and pytest's collection. The dev extras bring
        # in pytest + pytest-asyncio + types-PyYAML.
        run: pip install -e ".[dev]"
      - name: ruff
        run: ruff check .
      - name: black --check
        run: black --check .
      - name: mypy
        run: mypy --strict onboarding hello
      - name: pytest
        # PR-D adds onboarding/tests/ — deterministic, offline. Tests
        # that hit real upstreams (github MCP subprocess, real slack
        # auth, real gdrive auth) are gated behind GALILEO_ONBOARDING_*
        # env vars per the install_walkthrough.md cold-engineer flow;
        # the default test pass covers credentials.py roundtrip, GCM
        # AAD binding, nonce-uniqueness, and SourceKind dispatch.
        run: pytest -v onboarding/tests
      - name: pip-audit
        # Scoped to agents/'s declared project dependencies via the
        # positional project_path argument. Auditing the runner's full
        # installed env (the default) produces alerts on pip and the
        # install tooling that no contributor can act on from this repo;
        # that's noise the discipline rejects. PR-D's 10 runtime deps
        # are now the meaningful audit surface. See
        # docs/solutions/SOLUTION_CI_EXPANSION_FINDINGS.md.
        run: pip-audit --strict .

  web:
    name: web
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install
        run: npm install --no-audit --no-fund
      - name: type-check
        run: npx tsc --noEmit
      - name: eslint
        run: npx eslint .
      - name: npm audit
        # --omit=dev focuses the audit on production dependencies.
        # Stage 0 skeleton has minimal deps; audit activates as web/
        # grows.
        run: npm audit --omit=dev --audit-level=high

  protobuf:
    name: protobuf
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: schemas
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.45.0"
      - name: buf lint
        run: buf lint
      - name: buf breaking
        # Uses ref=refs/remotes/origin/main rather than branch=main
        # because actions/checkout only populates the remote-tracking
        # ref, not a local main branch; buf's branch= form resolves
        # against refs/heads/, which we don't have on PR runners.
        # See schemas/README.md for the full rationale.
        run: buf breaking --against '../.git#ref=refs/remotes/origin/main,subdir=schemas'
      - name: codegen consistency
        # Per CLAUDE.md "Generated code convention": developers run
        # `make generate` after schema changes and commit kernel/gen/.
        # This step rebuilds generated code in CI and fails if it
        # differs from what was committed, catching the failure mode
        # where a schema change merges with stale generated Go.
        run: |
          buf generate
          cd ..
          git diff --exit-code kernel/gen/ || { echo "::error::kernel/gen/ is out of date — run 'make generate' and commit"; exit 1; }

  agent-runner-integration:
    # Stage 0 / PR-C established the agent-runner integration test
    # against real Temporal + Postgres + LiteLLM. Stage 1 / PR-E
    # replaces both the postgres + temporal GHA service containers
    # with locally-built / step-launched docker containers on a shared
    # `galileo-ci` network. Reason: postgres-brain (the PR-E custom
    # image with pgvector + AGE) can't run as a GHA service container
    # because GHA service containers don't support locally-built
    # images. Temporal needs to reach postgres-brain by hostname; the
    # cleanest fix is to put both on the same docker network and
    # launch them in steps (Fork B per PR-E's verification round).
    # Temporal uses postgres-brain as its metadata store; the Brain
    # extensions don't interfere with Temporal's own tables.
    #
    # The agent_runner_integration tag excludes these from the default
    # go test pass.
    name: agent-runner-integration
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: kernel
    services:
      litellm:
        image: ghcr.io/berriai/litellm:v1.83.14-stable.patch.3
        env:
          LITELLM_LOG: INFO
          LITELLM_MODE: test
        ports:
          - 4000:4000
        options: >-
          --health-cmd "bash -c '</dev/tcp/127.0.0.1/4000'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 15s
    env:
      GALILEO_GATEWAY_DATABASE_URL: postgres://galileo:galileo@localhost:5432/galileo?sslmode=disable
      GALILEO_GATEWAY_LITELLM_URL: http://localhost:4000
      GALILEO_AGENT_GATEWAY_URL: http://localhost:8080
      GALILEO_AGENT_TEMPORAL_HOSTPORT: localhost:7233
      GALILEO_COST_EVENTS_SECRET: ci-shared-secret
      GALILEO_SKIP_OBS_WAIT: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: kernel/go.sum
      - name: build postgres-brain image
        run: docker build -t postgres-brain:ci ../deploy/compose/postgres-brain
      - name: create docker network
        run: docker network create galileo-ci
      - name: start postgres-brain
        run: |
          docker run -d --name postgres --network galileo-ci \
            -e POSTGRES_USER=galileo \
            -e POSTGRES_PASSWORD=galileo \
            -e POSTGRES_DB=galileo \
            -p 5432:5432 \
            postgres-brain:ci
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U galileo -d galileo; then
              echo "postgres ready"
              break
            fi
            sleep 1
          done
      - name: start temporal
        run: |
          docker run -d --name temporal --network galileo-ci \
            -e DB=postgres12 \
            -e DB_PORT=5432 \
            -e POSTGRES_USER=galileo \
            -e POSTGRES_PWD=galileo \
            -e POSTGRES_SEEDS=postgres \
            -p 7233:7233 \
            temporalio/auto-setup:1.29.6.1
          # Same bounded-retry shape as the observability poller. The
          # 60s timeout covers Temporal cluster health, which includes
          # the worker + frontend services starting against a cold
          # postgres-brain — slow CI runners need the headroom.
          for i in $(seq 1 60); do
            if docker exec temporal temporal operator cluster health --address temporal:7233 2>/dev/null; then
              echo "temporal ready"
              break
            fi
            sleep 1
          done
      - name: generate jwt keypair
        run: go run ./cmd/jwt-tool genkey -dir auth/dev-keys
      - name: start gateway subprocess
        run: |
          go build -o /tmp/galileo-gateway ./cmd/gateway
          GALILEO_GATEWAY_DATABASE_URL="$GALILEO_GATEWAY_DATABASE_URL" \
          GALILEO_GATEWAY_LITELLM_URL="$GALILEO_GATEWAY_LITELLM_URL" \
          GALILEO_COST_EVENTS_SECRET="$GALILEO_COST_EVENTS_SECRET" \
          GALILEO_GATEWAY_PUBKEY="$PWD/auth/dev-keys/public.pem" \
          GALILEO_GATEWAY_OTEL_ENDPOINT="" \
          /tmp/galileo-gateway >/tmp/gateway.log 2>&1 &
          echo $! >/tmp/gateway.pid
          # Wait for /healthz to respond — same bounded-retry shape as the
          # test setup's observability poller.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/healthz; then break; fi
            sleep 1
          done
          # Fail loudly if gateway didn't come up. PR-E iteration 2
          # finding: this job was reporting SUCCESS despite gateway-
          # startup migration errors because the loop just timed out
          # and proceeded. Same fail-loud posture as PR-A's
          # Postgres-unavailable check.
          if ! curl -fsS http://localhost:8080/healthz >/dev/null; then
            echo "::error::gateway subprocess failed to start within 30s; tail of /tmp/gateway.log:"
            tail -50 /tmp/gateway.log
            exit 1
          fi
      - name: agent-runner integration tests
        env:
          GALILEO_AGENT_JWT_PRIVATE_KEY_PATH: ${{ github.workspace }}/kernel/auth/dev-keys/private.pem
        run: go test -tags=agent_runner_integration -count=1 -v ./cmd/agent-runner/...
      - name: stop services
        if: always()
        run: |
          if [ -f /tmp/gateway.pid ]; then kill "$(cat /tmp/gateway.pid)" || true; fi
          cat /tmp/gateway.log || true
          docker logs temporal > /tmp/temporal.log 2>&1 || true
          docker logs postgres > /tmp/postgres.log 2>&1 || true
          docker stop temporal postgres || true
          docker rm temporal postgres || true
          docker network rm galileo-ci || true
          echo "--- postgres-brain logs (last 50 lines) ---"
          tail -50 /tmp/postgres.log || true
          echo "--- temporal logs (last 50 lines) ---"
          tail -50 /tmp/temporal.log || true
