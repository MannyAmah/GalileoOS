# Galileo OS — Stage 0 single-VM docker-compose stack
#
# Brings up the runtime dependencies for `galileo-gateway` (PR-A landed
# postgres + temporal + litellm; PR-B adds jaeger + otel-collector). PR-C
# wires `galileo-agent-runner` and `galileo-web` as services. Image tags
# are pinned per CLAUDE.md "Service image pins"; co-changed when bumped.
#
# What's NOT in this file:
#   - `galileo-gateway` as a container. The gateway-integration CI job
#     runs the gateway as a subprocess against these services;
#     production containerization is part of the Stage 0 gate-test path
#     in Week 4.

services:
  # PR-E (Stage 1 / ADR-0006) replaces the `postgres:17.9-alpine` image
  # with a custom build at `./postgres-brain/` that bundles pgvector +
  # Apache AGE on PostgreSQL 17. Same `galileo` database; same
  # credentials; healthcheck unchanged. See
  # `deploy/compose/postgres-brain/README.md` for the maintenance posture.
  postgres:
    build:
      context: ./postgres-brain
    environment:
      POSTGRES_USER: galileo
      POSTGRES_PASSWORD: galileo
      POSTGRES_DB: galileo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U galileo -d galileo"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  temporal:
    # Bundles temporal-server + auto-init script that wires Postgres on
    # first boot. The `.1` suffix on 1.29.6.1 is a base-image rebuild
    # without code change (security update from upstream).
    image: temporalio/auto-setup:1.29.6.1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: galileo
      POSTGRES_PWD: galileo
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233" # gRPC frontend
      - "8233:8233" # Web UI (Temporal UI)
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "temporal:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # LiteLLM's docs warn against main-stable (their floating tag) — specific
  # version tags are required for reproducibility. Bump under the
  # CLAUDE.md "Service image pins" co-change policy when LiteLLM ships
  # a new stable.
  litellm:
    image: ghcr.io/berriai/litellm:v1.83.14-stable.patch.3
    environment:
      # Stage 0 dev: no real provider credentials by default. Operators
      # set OPENAI_API_KEY (or ANTHROPIC_API_KEY etc.) in their local
      # .env before `make up`. The integration test in CI uses a
      # fake-LLM mode (LITELLM_MODE=test) that returns canned responses.
      LITELLM_LOG: INFO
      LITELLM_MODE: ${LITELLM_MODE:-test}
      # generic_api callback config — PR-B wires the success_callback to
      # POST every LLM call's StandardLoggingPayload to the gateway's
      # /internal/cost-events handler.
      GENERIC_LOGGER_ENDPOINT: ${GALILEO_COST_EVENTS_URL:-http://host.docker.internal:8080/internal/cost-events}
      GENERIC_LOGGER_HEADERS: ${GALILEO_COST_EVENTS_HEADERS:-Authorization=Bearer change-me}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml"]
    ports:
      - "4000:4000"
    # LiteLLM's runtime image (cgr.dev/chainguard/wolfi-base) installs
    # neither curl nor wget — just bash, openssl, nodejs, npm, python3,
    # libsndfile. Use bash's /dev/tcp builtin for a TCP-ready check.
    # Uvicorn binds port 4000 only after "Application startup complete"
    # per the LiteLLM boot logs, so port-open == app-ready for our
    # purposes (gateway connecting to the proxy).
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/4000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # Jaeger v2 all-in-one bundles collector + query + UI in one container.
  # Alpine-based, so utilities exist, but we still leave the healthcheck
  # to the test-setup poller (symmetric with otel-collector below); the
  # test setup polls http://localhost:16686/ during initialization.
  jaeger:
    image: jaegertracing/all-in-one:2.18.0
    ports:
      - "16686:16686" # UI
      - "4317"        # OTLP gRPC (not host-published; otel-collector hits it on the compose network)

  # OTel collector contrib v0.152.0. Image is FROM scratch (no shell, no
  # utilities) so docker healthcheck commands don't work; test-setup
  # polls http://localhost:13133/ for readiness instead. Dev host uses
  # the upstream image + command override; CI builds a wrapper image
  # (see deploy/compose/otel-wrapper/) because GHA service-containers
  # can't override CMD or mount config files.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.152.0
    command: ["--config", "/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (gateway sends spans here)
      - "13133:13133" # health_check extension
    depends_on:
      - jaeger

volumes:
  postgres-data:
