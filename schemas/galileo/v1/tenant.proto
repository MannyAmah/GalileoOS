// Tenant context — the only path through which any Galileo service
// reads tenant-scoped data. Per CLAUDE.md "When writing code": every
// query is scoped to a TenantContext.
//
// Versioned under galileo.v1 so future breaking changes go in v2
// without touching v1 consumers.

syntax = "proto3";

package galileo.v1;

option go_package = "github.com/MannyAmah/GalileoOS/kernel/gen/galileo/v1;galileov1";

// TenantId is a UUID v7 (sortable, no PII leak), generated by Postgres
// per docs/galileo_os_infrastructure_plan.md §locked decisions.
message TenantId {
  // RFC 9562 UUID v7 encoded as a 36-character canonical string.
  string value = 1;
}

// TenantContext is the carrier for tenant identity + plan tier +
// budget cap, attached to every request that touches tenant-scoped
// data. Constructed at the API gateway from a verified JWT; never
// constructed from raw user input downstream.
message TenantContext {
  TenantId tenant_id = 1;

  // Plan tier name (e.g., "starter", "team", "studio"). Authoritative
  // value lives in Postgres; this field is the cached read.
  string plan_tier = 2;

  // Monthly LLM budget cap in integer cents. Cost meter denies further
  // calls when month-to-date spend equals or exceeds this.
  int64 monthly_budget_cents = 3;

  // Issuance time of the JWT this context was minted from. Used to
  // detect stale contexts during long-lived workflows.
  int64 issued_at_unix = 4;
}
